<body>
    

    <script>
    
    // factorial of a number

     let factorial=1;
     let num=prompt("Enter a number=");
     for(let i=1; i<=num; i++){
        factorial*=i;
        console.log("Factorial of " + i + " is = " + factorial);
     }
    
     
    </script>
</body>
