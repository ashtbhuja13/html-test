<body>
    

    
 <script>

    // Fibonacci Series
    
    let num=prompt("Enter a number=");
    let a=0;
    let b=1;

    console.log("Fibonacci Series");
    for(let i=0; i<num; i++){
        console.log(a);
        let next=a+b;
        a=b;
        b=next;
    }
 </script>
