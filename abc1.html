<body>

  //Swapping  two numbers
  
  let a=prompt("Enter first number=");
  let b=prompt("Enter second number=");
  console.log("Before Swapping a ="+a+" "b="+b);

  let temp=a;
  a=b;
  b=temp;
  console.log("After Swapping a ="+a+" "b="+b);
</body>
